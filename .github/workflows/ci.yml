name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─── Backend: lint + test ────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint (flake8)
        run: flake8 . --config=../.flake8

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: posapi.settings.test
        run: python manage.py test --verbosity=2

  # ─── Frontend: lint + build ──────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Deploy (optional — only on push to main/master) ────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.RENDER_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s --fail -X POST "${{ vars.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered."

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.VERCEL_DEPLOY_HOOK_URL != ''
    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s --fail -X POST "${{ vars.VERCEL_DEPLOY_HOOK_URL }}"
          echo "Vercel deploy triggered."
